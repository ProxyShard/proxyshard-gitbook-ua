servers:
  - url: https://user-api.proxyshard.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ApiSuccess:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
      required:
        - success
        - message
    PurchaseRequest:
      type: object
      properties:
        product:
          type: string
          example: Datacenter Proxy
        location:
          type: string
          nullable: true
          example: DE
        cycle:
          type: string
          example: monthly
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 10
        promo_code:
          type: string
          nullable: true
          example: SAVE10
        auto_renewal:
          type: boolean
          default: false
      required:
        - product
        - cycle
    PurchaseRequestDcIsp:
      type: object
      description: Покупка для Datacenter/ISP – поле location обов'язкове.
      properties:
        product:
          type: string
          enum:
            - Datacenter Proxy
            - ISP Proxy
          example: Datacenter Proxy
        location:
          type: string
          example: DE
        cycle:
          type: string
          example: monthly
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 10
        promo_code:
          type: string
          nullable: true
        auto_renewal:
          type: boolean
          default: false
      required:
        - product
        - location
        - cycle
      x-gitbook-description-html: <p>Покупка для Datacenter/ISP - поле location обов'язково.</p>
    PurchaseRequestResidentialStandard:
      type: object
      description: >-
        Покупка Standart Residential Proxy — location не потрібно; цикл
        фіксований (lifetime).
      properties:
        product:
          type: string
          enum:
            - Standart Residential Proxy
          example: Standart Residential Proxy
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 1
        promo_code:
          type: string
          nullable: true
      required:
        - product
      x-gitbook-description-html: >-
        <p>Покупка Standart Residential Proxy — location не потрібно; цикл
        фіксований (lifetime).</p>
    PurchaseRequestResidentialPremium:
      type: object
      description: >-
        Купівля для Premium Residential Proxy – location не потрібна; цикл
        фіксований (lifetime).
      properties:
        product:
          type: string
          enum:
            - Premium Residential Proxy
          example: Premium Residential Proxy
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 1
        promo_code:
          type: string
          nullable: true
      required:
        - product
      x-gitbook-description-html: >-
        <p>Покупка для Premium Residential Proxy — location не вимагається; цикл
        фіксований (lifetime).</p>
    PurchaseRequestResidentialUnmetered:
      type: object
      description: Купівля для Unmetered Residential proxy – підтримує авто-продовження.
      properties:
        product:
          type: string
          enum:
            - Unmetered Residential proxy
          example: Unmetered Residential proxy
        cycle:
          type: string
          example: monthly
        promo_code:
          type: string
          nullable: true
        auto_renewal:
          type: boolean
          default: false
      required:
        - product
        - cycle
      x-gitbook-description-html: >-
        <p>Покупка для Unmetered Residential proxy - підтримує
        авто-продовження.</p>
    PurchaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Order paid successfully
        order_id:
          type: integer
      required:
        - success
        - message
        - order_id
    ActiveProxyItem:
      type: object
      properties:
        ip:
          type: string
        username:
          type: string
        password:
          type: string
        http_port:
          type: integer
        socks_port:
          type: integer
        until:
          type: string
          description: ISO8601/string date
          x-gitbook-description-html: <p>ISO8601/string date</p>
        status:
          type: string
      required:
        - ip
        - username
        - password
        - http_port
        - socks_port
        - until
        - status
    AvailableCountRequest:
      type: object
      properties:
        country:
          type: string
          example: DE
        product:
          type: string
          example: dc
      required:
        - country
        - product
    AvailableCountResponse:
      type: object
      properties:
        country:
          type: string
        product:
          type: string
        amount:
          type: integer
      required:
        - country
        - product
        - amount
    ApiMeResponse:
      type: object
      properties:
        email:
          type: string
        active_orders:
          type: integer
        wallet_balance:
          type: integer
          description: у центах
          x-gitbook-description-html: <p>в центах</p>
      required:
        - email
        - active_orders
        - wallet_balance
    ProductWithCycles:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        cycles:
          type: array
          items:
            type: string
      required:
        - name
        - cycles
    AddBandwidthRequest:
      type: object
      properties:
        amount:
          type: integer
          example: 5
          description: Обсяг у ГБ
          x-gitbook-description-html: <p>Обсяг у ГБ</p>
        promo_code:
          type: string
          nullable: true
      required:
        - amount
    GetSubUsersRequest:
      type: object
      properties:
        offset:
          type: integer
          example: 0
          description: Зміщення (за замовчуванням 0)
          x-gitbook-description-html: <p>Зміщення (за замовчуванням 0)</p>
        limit:
          type: integer
          example: 20
          description: Розмір сторінки (за замовчуванням 20)
          x-gitbook-description-html: <p>Розмір сторінки (за замовчуванням 20)</p>
    EditSubUserPayload:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    CreateSubUserPayload:
      type: object
      properties:
        proxy_type:
          type: string
          example: standart
        name:
          type: string
        data:
          type: integer
          example: 5
          description: Обсяг у ГБ
          x-gitbook-description-html: <p>Обсяг у ГБ</p>
      required:
        - proxy_type
        - name
        - data
    ChangeSubUserPasswordPayload:
      type: object
      properties:
        proxy_type:
          type: string
          example: standart
      required:
        - proxy_type
    ModifyTrafficPayload:
      type: object
      properties:
        proxy_type:
          type: string
          example: standart
        data:
          type: integer
          example: 5
          description: Обсяг у ГБ
          x-gitbook-description-html: <p>Обсяг у ГБ</p>
      required:
        - proxy_type
        - data
    Country:
      type: object
      properties:
        code:
          type: string
          maxLength: 10
          description: ISO country code
          x-gitbook-description-html: <p>ISO country code</p>
        name:
          type: string
          maxLength: 255
          description: Country name
          x-gitbook-description-html: <p>Country name</p>
      required:
        - code
        - name
    Region:
      type: object
      properties:
        code:
          type: string
          maxLength: 10
          description: Region code (state/province code)
          x-gitbook-description-html: <p>Region code (state/province code)</p>
        name:
          type: string
          maxLength: 255
          description: Region name (state/province name)
          x-gitbook-description-html: <p>Region name (state/province name)</p>
        country:
          $ref: '#/components/schemas/Country'
      required:
        - code
        - name
        - country
    City:
      type: object
      properties:
        code:
          type: string
          maxLength: 50
          description: City code (usually slug format)
          x-gitbook-description-html: <p>City code (usually slug format)</p>
        name:
          type: string
          maxLength: 255
          description: City name
          x-gitbook-description-html: <p>City name</p>
        country:
          $ref: '#/components/schemas/Country'
        region:
          type: object
          nullable: true
          properties:
            code:
              type: string
              maxLength: 10
              description: Region code
              x-gitbook-description-html: <p>Region code</p>
            name:
              type: string
              maxLength: 255
              description: Region name
              x-gitbook-description-html: <p>Region name</p>
          required:
            - code
            - name
      required:
        - code
        - name
        - country
    PagedCountriesResponse:
      type: object
      properties:
        count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Country'
      required:
        - count
        - results
    PagedRegionsResponse:
      type: object
      properties:
        count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Region'
      required:
        - count
        - results
    PagedCitiesResponse:
      type: object
      properties:
        count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/City'
      required:
        - count
        - results
paths:
  /user/api/orders/purchase:
    post:
      tags:
        - General
      security:
        - bearerAuth: []
      summary: Створити та сплатити замовлення
      description: |
        Купівля на ім'я продукту, локації та циклу.
        Для Datacenter/ISP - location обов'язковий.
        Для Standart Residential Proxy location не потрібно.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/PurchaseRequestDcIsp'
                - $ref: '#/components/schemas/PurchaseRequestResidentialStandard'
                - $ref: '#/components/schemas/PurchaseRequestResidentialPremium'
                - $ref: '#/components/schemas/PurchaseRequestResidentialUnmetered'
                - $ref: '#/components/schemas/PurchaseRequest'
            examples:
              datacenter:
                value:
                  product: Datacenter Proxy
                  location: DE
                  cycle: monthly
                  quantity: 10
                  auto_renewal: true
              isp:
                value:
                  product: ISP Proxy
                  location: US
                  cycle: monthly
                  quantity: 5
              residentialStandard:
                value:
                  product: Standart Residential Proxy
                  quantity: 1
              residentialPremium:
                value:
                  product: Premium Residential Proxy
                  quantity: 1
              residentialNew:
                value:
                  product: Residential Proxy NEW
                  cycle: monthly
                  quantity: 1
              unmeteredResidential:
                value:
                  product: Unmetered Residential proxy
                  cycle: monthly
                  auto_renewal: true
              mobile:
                value:
                  product: Mobile Proxy Plan Name
                  cycle: day
                  quantity: 1
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseResponse'
          x-gitbook-description-html: <p>Успішно</p>
        '400':
          description: Помилка валідації/балансу/недолік стоку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Помилка валідації/балансу/недолік стоку</p>
        '401':
          description: Неавторизований
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Неавторизований</p>
      x-gitbook-description-document:
        object: document
        data:
          schemaVersion: 9
        nodes:
          - object: block
            type: paragraph
            isVoid: false
            data: {}
            nodes:
              - object: text
                leaves:
                  - object: leaf
                    text: >-
                      Купівля на ім'я продукту, локації та циклу. Для
                      Datacenter/ISP - location обов'язковий. Для Standart
                      Residential Proxy – location не потрібно.
                    marks: []
                key: a6YDYJfLO9R9
            key: S5jpGa8ot9FH
        key: 7j57RKNQ66xt
      x-gitbook-description-html: >-
        <p>Покупка на ім'я продукту, локації та циклу. Для Datacenter/ISP -
        location обов'язковий. Для Standart Residential Proxy — location не
        потрібно.</p>
  /user/api/orders/change-billing-cycle/{order_id}:
    post:
      tags:
        - General
      security:
        - bearerAuth: []
      summary: Змінити білінг-цикл замовлення
      description: >
        Змінює цикл оплати за назвою циклу. Тільки для Datacenter & ISP
        проксі.

        Якщо промокод недоступний для вибраного циклу, він буде автоматично
        скинутий.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cycle:
                  type: string
                  example: monthly
              required:
                - cycle
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  order:
                    type: object
          x-gitbook-description-html: <p>Успішно</p>
        '400':
          description: Неправильний продукт чи цикл
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Невірний продукт або цикл</p>
        '401':
          description: Неавторизований
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Неавторизований</p>
        '403':
          description: Цикл недоступний для цього користувача
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Цикл недоступний для цього користувача</p>
      x-gitbook-description-document:
        object: document
        data:
          schemaVersion: 9
        nodes:
          - object: block
            type: paragraph
            isVoid: false
            data: {}
            nodes:
              - object: text
                leaves:
                  - object: leaf
                    text: >-
                      Змінює цикл оплати за назвою циклу. Тільки для
                      Datacenter & ISP проксі. Якщо промокод недоступний для
                      вибраного циклу, він буде автоматично скинутий.
                    marks: []
                key: FCRCqYnCRIMJ
            key: CstYjsmMFFpH
        key: RctxTbOKuya7
      x-gitbook-description-html: >-
        <p>Змінює цикл оплати за назвою циклу. Тільки для Datacenter &
        ISP проксі. Якщо промокод недоступний для вибраного циклу, він буде
        автоматично скинуто.</p>
  /user/api/orders/edit-auto-renewal/{order_id}:
    post:
      tags:
        - General
      security:
        - bearerAuth: []
      summary: Змінити авто-продовження замовлення
      description: |
        Увімкнути/вимкнути авто-продовження. Тільки для Datacenter & ISP проксі.
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: integer
        - in: query
          name: auto_renewal
          required: true
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
          x-gitbook-description-html: <p>Успішно</p>
        '400':
          description: Неправильний продукт для операції
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Невірний продукт для операції</p>
        '401':
          description: Неавторизований
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Неавторизований</p>
      x-gitbook-description-document:
        object: document
        data:
          schemaVersion: 9
        nodes:
          - object: block
            type: paragraph
            isVoid: false
            data: {}
            nodes:
              - object: text
                leaves:
                  - object: leaf
                    text: >-
                      Увімкнути/вимкнути авто-продовження. Тільки для Datacenter &
                      ISP проксі.
                    marks: []
                key: K9SC5NGtClVi
            key: wsP9craixrO9
        key: lPUU4UXDZMgV
      x-gitbook-description-html: >-
        <p>Увімкнути/вимкнути авто-продовження. Тільки для Datacenter & ISP
        проксі.</p>
  /user/api/proxies/active:
    get:
      tags:
        - Datacenter & ISP Proxies
      security:
        - bearerAuth: []
      summary: Отримати активні проксі на замовлення
      parameters:
        - in: query
          name: order_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список проксі
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActiveProxyItem'
                  order_tag:
                    type: string
                    nullable: true
                required:
                  - success
                  - data
          x-gitbook-description-html: <p>Список проксі</p>
        '403':
          description: Метод недоступний для цього замовлення
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          x-gitbook-description-html: <p>Метод недоступний для цього замовлення</p>
  /user/api/proxies/products:
    get:
      tags:
        - General
      security:
        - bearerAuth: []
      summary: Отримати продукти та їх цикли
      description: Повертає продукти API з назвами доступних циклів.
      responses:
        '200':
          description: Список продуктів
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductWithCycles'
                required:
                  - success
                  - products
          x-gitbook-description-html: <p>Список продуктів</p>
      x-gitbook-description-document:
        object: document
        data:
          schemaVersion: 9
        nodes:
          - object: block
            type: paragraph
            isVoid: false
            data: {}
            nodes:
              - object: text
                leaves:
                  - object: leaf
                    text: Повертає продукти API з назвами доступних циклів.
                    marks: []
                key: ae0gjXUIoxK0
            key: H8DZM6car1fH
        key: dPLJyH3Xi2mm
      x-gitbook-description-html: <p>Повертає продукти для API з назвами доступних циклів.</p>
  /user/api/proxies/available-count:
    get:
      tags:
        - General
      security:
        - bearerAuth: []
      summary: Дізнатися про проксі
      description: Повертає доступну сумарну кількість для всіх продуктів.
      responses:
        '200':
          description: Успішно
